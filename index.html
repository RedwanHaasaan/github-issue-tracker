<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page || Github Issue Tracker</title>
    <!-- tailwind & daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Css File -->
    <link rel="stylesheet" href="./style/style.css">
    <!-- Favicon -->
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>
<body>
    <section class="bg-color min-h-screen flex items-center justify-center px-2">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-md">
            <div class="card-body pb-0 flex flex-col gap-6">
                <div class="flex justify-center">
                    <img src="./assets/github-logo.png" alt="Github Logo">
                </div>
                <div class="text-center">
                    <h1 class="text-2xl font-semibold text-gray-700">GitHub Issues Tracker</h1>
                    <p class="text-base font-normal text-gray-500">Sign in to manage your issues</p>
                </div>
            </div>
            <div class="card-body pb-0">
            <fieldset id="loginForm" class="fieldset relative">
                <label class="label text-base font-medium text-gray-600">Username</label>
                <input type="text" id="inputUsername" class="input" placeholder="Enter Your Username" />

                <label class="label text-base font-medium text-gray-600">Password</label>
                <input type="password" id="inputPassword" class="input" placeholder="Password" />

                <button id="signInBtn" class="btn btn-primary mt-4 rounded-lg">Sign In</button>
                <div role="alert" id="failAlert"
                    class="alert alert-error alert-soft mt-2 hidden">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-6 w-6 shrink-0 stroke-current"
                        fill="none"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span>Invalid username or password. Please try again.</span>
                </div>
            </fieldset>
            </div>
            <div class="divider px-7">OR</div>
            <div class="card-body pt-0 text-center">
                <h1 class="text-sm text-gray-500 font-normal">Demo Credentials:</h1>
                <div class="bg-gray-100 flex flex-col py-6 rounded-lg">
                    <p class="font-bold text-gray-700">Username: <span class="font-normal">admin</span></p>
                    <p class="font-bold text-gray-700">Password: <span class="font-normal">admin123</span></p>
                </div>
            </div>
        </div>
        <!-- Modal -->
        <dialog id="successModal" class="modal">
        <div class="modal-box text-center">

            <!-- Success Icon -->
            <div class="flex justify-center mb-4">
            <div class="bg-green-100 p-4 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg"
                class="w-10 h-10 text-green-600"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor">

                <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            </div>

            <!-- Title -->
            <h3 class="font-bold text-xl text-green-600">
            Login Successful
            </h3>

            <!-- Message -->
            <p class="py-3 text-gray-600">
            Welcome back! You have successfully signed in.
            </p>

            <!-- Button -->
            <div class="modal-action justify-center">
            <form method="dialog">
                <button class="btn btn-success text-white px-6">
                Continue
                </button>
            </form>
            </div>

        </div>
        </dialog>
    </section>
    <script src="./js/login.js"></script>
</body>
</html>
