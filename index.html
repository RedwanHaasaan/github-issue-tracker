<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page || Github Issue Tracker</title>
    <!-- tailwind & daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Css File -->
    <link rel="stylesheet" href="./style/style.css">
    <!-- Favicon -->
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>
<body>
    <section class="bg-color min-h-screen flex items-center justify-center px-2">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-md">
            <div class="card-body pb-0 flex flex-col gap-6">
                <div class="flex justify-center">
                    <img src="./assets/github-logo.png" alt="Github Logo">
                </div>
                <div class="text-center">
                    <h1 class="text-2xl font-semibold text-gray-700">GitHub Issues Tracker</h1>
                    <p class="text-base font-normal text-gray-500">Sign in to manage your issues</p>
                </div>
            </div>
            <div class="card-body pb-0">
                <fieldset class="fieldset">
                    <label class="label text-base font-medium text-gray-600">Username</label>
                    <input type="text" class="input" placeholder="Enter Your Username" />
                    <label class="label text-base font-medium text-gray-600">Password</label>
                    <input type="password" class="input" placeholder="Password" />
                    <button class="btn btn-primary mt-4 rounded-lg">Sign In</button>
                </fieldset>
            </div>
            <div class="divider px-7">OR</div>
            <div class="card-body pt-0 text-center">
                <h1 class="text-sm text-gray-500 font-normal">Demo Credentials:</h1>
                <div class="bg-gray-100 flex flex-col py-6 rounded-lg">
                    <p class="font-bold text-gray-700">Username: <span class="font-normal">admin</span></p>
                    <p class="font-bold text-gray-700">Password: <span class="font-normal">admin123</span></p>
                </div>
            </div>
        </div>
    </section>
    <script src="./js/main.js"></script>
</body>
</html>
