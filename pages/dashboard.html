<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard || Github Issue Tracker</title>
    <!-- tailwind & daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awosome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Css File -->
    <link rel="stylesheet" href="../style/style.css">
    <!-- Favicon -->
    <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">
</head>

<body>
    <nav class="sticky z-50 top-0">
        <div class="navbar bg-base-100 shadow-sm px-3">
            <!-- Left Side -->
            <div class="flex-1">
                <a class="flex items-center gap-2">
                    <img src="../assets/github-logo.png" alt="Logo" class="w-8 h-8">
                    <span class="text-lg sm:text-xl font-semibold text-gray-700">
                        GitHub Issues Tracker
                    </span>
                </a>
            </div>
            <!-- Mobile Menu Button -->
            <div class="lg:hidden">
                <button class="btn btn-ghost" onclick="toggleMenu()">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
            </div>
            <!-- Desktop Menu -->
            <div id="navMenu" class="hidden lg:flex gap-3 items-center">
                <!-- Search -->
                <label class="input input-bordered flex items-center gap-2">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchInput" type="search" placeholder="Search your issue..." class="w-full sm:w-48 outline-none" />
                </label>
                <!-- New Issue Button -->
                <button class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i>
                    <span class="hidden sm:inline">New Issue</span>
                </button>
            </div>
        </div>
        <!-- Mobile Dropdown -->
        <div id="mobileMenu" class="hidden flex-col p-4 bg-base-100 shadow lg:hidden">
            <label class="input input-bordered flex items-center gap-2 w-full">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" placeholder="Search" class="w-full" />
            </label>
            <button class="btn btn-primary w-full mt-4">
                <i class="fa-solid fa-plus"></i>
                <span>New Issue</span>
            </button>
        </div>
    </nav>
    <main class="bg-gray-100 min-h-screen py-6 px-4 sm:px-6 lg:px-16 xl:px-32">
        <section class="flex flex-col gap-4">
            <!-- Upper Container -->
            <div id="btnContainer" class="bg-white p-4 rounded-lg shadow flex flex-col sm:flex-row gap-3">
                <button id="primaryBtn" class="btn btn-outline btn-primary btn-active w-full sm:w-auto">
                    All
                </button>
                <button id="openBtn" class="btn btn-outline btn-success hover:text-white w-full sm:w-auto">
                    Open
                </button>
                <button id="closedBtn" class="btn btn-outline btn-error hover:text-white w-full sm:w-auto">
                    Closed
                </button>
            </div>
            <!-- Lower Container -->
            <div class="bg-card-section flex flex-col gap-6">
                <div
                    class="bg-white shadow-md rounded-lg p-4 sm:p-6 flex flex-col md:flex-row gap-6 md:items-center md:justify-between">
                    <!-- LEFT -->
                    <div class="flex items-center gap-3">
                        <div
                            class="bg-aperture w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center">
                            <img src="../assets/Aperture.png" alt="Aperture" class="w-6 h-6 sm:w-8 sm:h-8">
                        </div>
                        <div>
                            <h1 class="text-lg sm:text-xl font-semibold text-gray-800">
                                <span id="issueCounter">
                                    <!-- counter appear -->
                                </span> Issues
                            </h1>
                            <p class="text-sm text-gray-500">
                                Track and manage your project issues
                            </p>
                        </div>
                    </div>
                    <!-- RIGHT -->
                    <div class="flex flex-row gap-6 items-center justify-center w-full md:w-auto md:justify-end">
                        <!-- Open -->
                        <div class="flex items-center gap-2">
                            <div class="inline-grid *:[grid-area:1/1]">
                                <div id="openPing" class="status status-success"></div>
                                <div class="status status-success"></div>
                            </div>
                            <span class="text-sm font-medium">Open</span>
                        </div>
                        <!-- Closed -->
                        <div class="flex items-center gap-2">
                            <div class="inline-grid *:[grid-area:1/1]">
                                <div id="closedPing" class="status status-error"></div>
                                <div class="status status-error"></div>
                            </div>
                            <span class="text-sm font-medium">Closed</span>
                        </div>
                    </div>
                </div>
                <div class="lg:p-6">
                    <div id="cardContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 place-items-center">
                        <!-- Cards will be there -->
                    </div>
                </div>
            </div>
        </section>
        <!-- Modal -->
        <dialog id="issueModal" class="modal">
            <div class="modal-box max-w-lg">

                <!-- Title -->
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-2"></h2>

                <!-- Status + Author -->
                <div class="flex flex-wrap items-center gap-2 text-sm text-gray-500 mb-4">
                <span id="modalStatus"></span>
                <span id="modalAuthor"></span>
                <span id="modalDate"></span>
                </div>

                <!-- Labels -->
                <div id="modalLabels" class="flex flex-wrap gap-2 mb-4"></div>

                <!-- Description -->
                <p id="modalDescription" class="text-gray-600 mb-6"></p>

                <!-- Info Section -->
                <div class="bg-gray-100 rounded-lg p-4 flex flex-col sm:flex-row justify-between gap-4 mb-6">

                <div>
                    <p class="text-sm text-gray-500">Assignee:</p>
                    <p id="modalAssignee" class="font-semibold"></p>
                </div>

                <div>
                    <p class="text-sm text-gray-500">Priority:</p>
                    <span id="modalPriority"></span>
                </div>

                </div>

                <!-- Actions -->
                <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary">Close</button>
                </form>
                </div>

            </div>
        </dialog>
    </main>
    <script src="../js/dashboard.js"></script>
</body>

</html>
